name: Security Scan

on:
  pull_request:
    branches: [main]

jobs:
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: Go Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      # G304 (file path from variable) and G107 (url from variable) are
      # expected in a security scanner that intentionally probes URLs and
      # reads config files. All other rules are enforced.
      - name: Run gosec
        run: gosec -exclude=G304,G107 -fmt sarif -out gosec.sarif ./... || true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: gosec.sarif
          category: gosec
