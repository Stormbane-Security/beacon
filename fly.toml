app = "beacon"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  BEACON_ADDR    = ":8080"
  BEACON_WORKERS = "2"
  BEACON_STORE_PATH = "/data/beacon.db"

# Secrets (set via `fly secrets set`):
#   BEACON_API_KEY
#   BEACON_ANTHROPIC_API_KEY

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 10
    hard_limit = 20

[[mounts]]
  source      = "beacon_data"
  destination = "/data"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
